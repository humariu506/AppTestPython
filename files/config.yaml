# Configuration NRTK Test Program
# Réseau Centipede RTK — 5 balises pour mode NRTK/VRS

# --- Capteur GNSS ---
sensor:
  port: "COM4"          # Linux — changer en "COMX" sous Windows
  baudrate: 115200
  timeout: 2.0
  mock: true # true = données simulées, false = capteur réel

# --- Balises Centipede (NTRIP) ---
# Choisir 5 balises proches de votre position de travail
# Liste complète : https://centipede.fr/

bases:
  - id: "81"
    host: "crtk.net"
    port: 2101
    mountpoint: "OUIL"          # Remplacer par les mountpoints réels
    lat: 48.9229               # Latitude approx. de la balise
    lon: 2.1776
    alt: 86.5613
  - id: "1220"
    host: "crtk.net"
    port: 2101
    mountpoint: "IPGP"
    lat: 48.8449
    lon: 2.3563
    alt: 104.6638
  - id: "825"
    host: "crtk.net"
    port: 2101
    mountpoint: "RICE"
    lat: 48.7815
    lon: 2.4300
    alt: 87.0478
  - id: "383"
    host: "crtk.net"
    port: 2101
    mountpoint: "GEODATA2"
    lat: 48.8411
    lon: 2.5873
    alt: 160.528
  - id: "351"
    host: "crtk.net"
    port: 2101
    mountpoint: "CDFX"
    lat: 48.7070
    lon: 1.9796
    alt: 206.8928

# --- NTRIP credentials ---
ntrip:
  mock: false                   # true = bases simulées, false = vraies bases (mode hybride possible)
  user: "centipede"
  password: "centipede"
  version: 2                    # NTRIP v2 recommandé

# --- RTKLIB ---
rtklib:
  # Chemin vers rtkrcv ou rtkpost (RTKLIB compilé)
  # Chemins relatifs à ce fichier config.yaml pour rester portable.
  # Le dossier RTKLIB-master est au même niveau que le dossier files.
  # Exemple Windows compilé : "../RTKLIB-master/app/rtkpost/rtkpost.exe"
  rtkrcv_path: "../RTKLIB-master/app/rtkrcv/rtkrcv.c"
  rtkpost_path: "../RTKLIB-master/app/rtkpost/rtkpost.cpp"
  # Mode de positionnement : kinematic = RTK temps réel
  mode: "kinematic"
  # Fréquences : 1=L1 seulement, 2=L1+L2 (selon capteur)
  freq: 1
  # Elevation mask (degrés) — exclure satellites bas sur horizon
  elev_mask: 10
  # Systèmes GNSS activés (GPS+GLONASS+Galileo)
  navsys: 7
  # Seuil ratio pour fix ambiguïté (AR ratio)
  ar_ratio: 3.0
  # Timeout fix (secondes)
  fix_timeout: 60

# --- Mock ---
mock:
  # Position simulée du capteur
  rover_lat: 48.8300
  rover_lon: 2.3700
  rover_alt: 42.0
  # Bruit simulé sur la position brute (mètres)
  position_noise: 0.035
  # Cadence NMEA (Hz)
  nmea_rate: 1
  # Cadence RTCM par base (Hz)
  rtcm_rate: 1
  # Simulation de perte de signal occasionnelle
  dropout_prob: 0.02

# --- UI ---
ui:
  update_rate_ms: 500           # Rafraîchissement de l'interface (ms)
  coordinate_decimals: 8        # Décimales affichées lat/lon
  show_satellite_count: true
  show_rtcm_age: true
